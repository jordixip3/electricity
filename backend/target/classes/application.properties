# Server configuration
server.port=8080
server.servlet.context-path=/api

# Oracle DB Connection Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@192.168.1.130:1521/ORCLPDB1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:APP_ELECTRICIDAD}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Oracle123}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Hibernate/JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging Configuration
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT Configuration
app.jwt.secret=ElectricidadSecretKey2024XyZ!@#$%^&*()
app.jwt.expiration-hours=24
